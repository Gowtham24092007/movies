<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieFlix</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="left-header">
  <div class="menu-icon" id="menu-btn">☰</div>
  <h1>MovieFlix</h1>
</div>
  <input type="text" id="search" placeholder="Search movies...">
</header>
<div id="overlay" class="overlay hidden"></div>
<div id="sidebar" class="sidebar hidden">
  <div class="close-btn" id="close-menu">✖</div>
  <ul>
    <li id="home-btn">Home</li>
    <li id="categories-btn">Categories</li>
    <li>Watchlist</li>
  </ul>
</div>
<div class="container" id="main-content">
  <h2 id="title">Trending Movies</h2>
  <div class="movies" id="movies"></div>
</div>
<div class="container hidden" id="categories-section"></div>
</div>
<script src="script.js"></script>
</body>
</html>
